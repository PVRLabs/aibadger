name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build release archive
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -eu

          mkdir -p dist

          if [ "$GOOS" = "windows" ]; then
            binary_name="badger.exe"
            archive_ext=".zip"
          else
            binary_name="badger"
            archive_ext=".tar.gz"
          fi

          out_dir="dist/badger_${GOOS}_${GOARCH}"
          archive_name="badger_${RELEASE_TAG#v}_${GOOS}_${GOARCH}${archive_ext}"

          mkdir -p "${out_dir}"
          go build -trimpath -tags aibadger_release -ldflags="-s -w" -o "${out_dir}/${binary_name}" ./cmd/badger

          if [ "$GOOS" = "windows" ]; then
            zip -j "dist/${archive_name}" "${out_dir}/${binary_name}"
          else
            tar -czf "dist/${archive_name}" -C "${out_dir}" "${binary_name}"
          fi
          sha256sum "dist/${archive_name}" > "dist/${archive_name}.sha256"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: publish release assets
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release-assets/*.tar.gz
            release-assets/*.tar.gz.sha256
            release-assets/*.zip
            release-assets/*.zip.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
